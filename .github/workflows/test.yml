name: Build and Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.19
    - name: Build Go module
      run: go build -o main main.go
    - name: Test
      run: echo 'Success!' > test.txt
    - name: Archive test.txt
      uses: actions/upload-artifact@v2
      with:
        name: test.txt
        path: test.txt
    - name: Download test.txt
      uses: actions/download-artifact@v2
      with:
        name: test.txt
        path: test.txt